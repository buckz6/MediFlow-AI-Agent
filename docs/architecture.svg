<svg width="900" height="600" viewBox="0 0 900 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="600" fill="#0F172A"/>
  
  <!-- Logo -->
  <text x="20" y="35" fill="white" font-family="system-ui, sans-serif" font-size="20" font-weight="bold">🫁 MediFlow</text>

  <!-- Markers for Arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6B7280" />
    </marker>
  </defs>

  <!-- LAYER 1: INPUT LAYER -->
  <text x="450" y="25" fill="#10B981" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">INPUT LAYER</text>
  <!-- Box 1 -->
  <rect x="20" y="40" width="200" height="70" rx="8" fill="#10B981" fill-opacity="0.1" stroke="#10B981" stroke-width="2"/>
  <text x="120" y="70" fill="white" font-family="system-ui" font-size="13" text-anchor="middle">🖼️ X-Ray / CT Scan</text>
  <text x="120" y="90" fill="#10B981" font-family="monospace" font-size="11" text-anchor="middle">EfficientNet-B4</text>
  <!-- Box 2 -->
  <rect x="240" y="40" width="200" height="70" rx="8" fill="#10B981" fill-opacity="0.1" stroke="#10B981" stroke-width="2"/>
  <text x="340" y="70" fill="white" font-family="system-ui" font-size="13" text-anchor="middle">📄 Lab Report PDF</text>
  <text x="340" y="90" fill="#10B981" font-family="monospace" font-size="11" text-anchor="middle">Gemini Multimodal</text>
  <!-- Box 3 -->
  <rect x="460" y="40" width="200" height="70" rx="8" fill="#10B981" fill-opacity="0.1" stroke="#10B981" stroke-width="2"/>
  <text x="560" y="70" fill="white" font-family="system-ui" font-size="13" text-anchor="middle">🎙️ Audio Konsultasi</text>
  <text x="560" y="90" fill="#10B981" font-family="monospace" font-size="11" text-anchor="middle">Speechmatics</text>
  <!-- Box 4 -->
  <rect x="680" y="40" width="200" height="70" rx="8" fill="#10B981" fill-opacity="0.1" stroke="#10B981" stroke-width="2"/>
  <text x="780" y="70" fill="white" font-family="system-ui" font-size="13" text-anchor="middle">📝 Rekam Medis</text>
  <text x="780" y="90" fill="#10B981" font-family="monospace" font-size="11" text-anchor="middle">Gemini Pro</text>

  <!-- Arrows L1 -> L2 -->
  <line x1="120" y1="110" x2="120" y2="165" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="340" y1="110" x2="340" y2="165" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="560" y1="110" x2="560" y2="165" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="780" y1="110" x2="780" y2="165" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- LAYER 2: PROCESSING & FUSION -->
  <text x="450" y="160" fill="#3B82F6" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">PROCESSING &amp; FUSION</text>
  <!-- Box 1 -->
  <rect x="20" y="175" width="265" height="70" rx="8" fill="#3B82F6" fill-opacity="0.1" stroke="#3B82F6" stroke-width="2"/>
  <text x="152.5" y="205" fill="white" font-family="system-ui" font-size="13" text-anchor="middle">Grad-CAM Heatmap</text>
  <text x="152.5" y="225" fill="#3B82F6" font-family="monospace" font-size="11" text-anchor="middle">Visualisasi area suspect</text>
  <!-- Box 2 -->
  <rect x="317.5" y="175" width="265" height="70" rx="8" fill="#3B82F6" fill-opacity="0.1" stroke="#3B82F6" stroke-width="2"/>
  <text x="450" y="205" fill="white" font-family="system-ui" font-size="13" text-anchor="middle">Confidence Scoring</text>
  <text x="450" y="225" fill="#3B82F6" font-family="monospace" font-size="11" text-anchor="middle">per modalitas input</text>
  <!-- Box 3 -->
  <rect x="615" y="175" width="265" height="70" rx="8" fill="#3B82F6" fill-opacity="0.1" stroke="#3B82F6" stroke-width="2"/>
  <text x="747.5" y="205" fill="white" font-family="system-ui" font-size="13" text-anchor="middle">Ensemble Fusion</text>
  <text x="747.5" y="225" fill="#3B82F6" font-family="monospace" font-size="11" text-anchor="middle">CV + LLM reasoning</text>

  <!-- Converging Arrows L2 -> L3 -->
  <path d="M152.5 245 V 270 L 450 295" stroke="#6B7280" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M450 245 V 295" stroke="#6B7280" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M747.5 245 V 270 L 450 295" stroke="#6B7280" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- LAYER 3: LANGRAPH ORCHESTRATOR -->
  <text x="450" y="305" fill="#8B5CF6" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">LANGRAPH ORCHESTRATOR</text>
  <rect x="20" y="315" width="860" height="40" rx="8" fill="#8B5CF6" fill-opacity="0.1" stroke="#8B5CF6" stroke-width="2"/>
  <text x="450" y="340" fill="white" font-family="system-ui" font-size="15" font-weight="bold" text-anchor="middle">🧠 Orchestrator Agent — LangGraph</text>

  <!-- Branching Arrows L3 -> L4 -->
  <line x1="120" y1="355" x2="120" y2="385" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="340" y1="355" x2="340" y2="385" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="560" y1="355" x2="560" y2="385" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="780" y1="355" x2="780" y2="385" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- LAYER 4: SPECIALIZED AGENTS -->
  <text x="450" y="380" fill="#F59E0B" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">SPECIALIZED AGENTS</text>
  <!-- Agent 1 -->
  <rect x="20" y="390" width="200" height="70" rx="8" fill="#F59E0B" fill-opacity="0.1" stroke="#F59E0B" stroke-width="2"/>
  <text x="120" y="420" fill="white" font-family="system-ui" font-size="13" text-anchor="middle">Clinical Agent</text>
  <text x="120" y="440" fill="#F59E0B" font-family="monospace" font-size="11" text-anchor="middle">Diagnosis + Terapi</text>
  <!-- Agent 2 -->
  <rect x="240" y="390" width="200" height="70" rx="8" fill="#F59E0B" fill-opacity="0.1" stroke="#F59E0B" stroke-width="2"/>
  <text x="340" y="420" fill="white" font-family="system-ui" font-size="13" text-anchor="middle">Finance Agent</text>
  <text x="340" y="440" fill="#F59E0B" font-family="monospace" font-size="11" text-anchor="middle">Biaya + BPJS</text>
  <!-- Agent 3 -->
  <rect x="460" y="390" width="200" height="70" rx="8" fill="#F59E0B" fill-opacity="0.1" stroke="#F59E0B" stroke-width="2"/>
  <text x="560" y="420" fill="white" font-family="system-ui" font-size="13" text-anchor="middle">Education Agent</text>
  <text x="560" y="440" fill="#F59E0B" font-family="monospace" font-size="11" text-anchor="middle">Edukasi Pasien</text>
  <!-- Agent 4 -->
  <rect x="680" y="390" width="200" height="70" rx="8" fill="#F59E0B" fill-opacity="0.1" stroke="#F59E0B" stroke-width="2"/>
  <text x="780" y="420" fill="white" font-family="system-ui" font-size="13" text-anchor="middle">Workflow Agent</text>
  <text x="780" y="440" fill="#F59E0B" font-family="monospace" font-size="11" text-anchor="middle">Scheduling</text>

  <!-- Arrows L4 -> L5 -->
  <line x1="120" y1="460" x2="120" y2="495" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="340" y1="460" x2="340" y2="495" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="560" y1="460" x2="560" y2="495" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="780" y1="460" x2="780" y2="495" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- LAYER 5: OUTPUT DASHBOARD -->
  <text x="450" y="495" fill="#14B8A6" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">OUTPUT DASHBOARD</text>
  <!-- Output 1 -->
  <rect x="20" y="505" width="200" height="60" rx="8" fill="#14B8A6" fill-opacity="0.1" stroke="#14B8A6" stroke-width="2"/>
  <text x="120" y="530" fill="white" font-family="system-ui" font-size="13" text-anchor="middle">X-Ray + Heatmap</text>
  <text x="120" y="550" fill="#14B8A6" font-family="monospace" font-size="11" text-anchor="middle">Grad-CAM overlay</text>
  <!-- Output 2 -->
  <rect x="240" y="505" width="200" height="60" rx="8" fill="#14B8A6" fill-opacity="0.1" stroke="#14B8A6" stroke-width="2"/>
  <text x="340" y="530" fill="white" font-family="system-ui" font-size="13" text-anchor="middle">Laporan Diagnosis</text>
  <text x="340" y="550" fill="#14B8A6" font-family="monospace" font-size="11" text-anchor="middle">PDF otomatis</text>
  <!-- Output 3 -->
  <rect x="460" y="505" width="200" height="60" rx="8" fill="#14B8A6" fill-opacity="0.1" stroke="#14B8A6" stroke-width="2"/>
  <text x="560" y="530" fill="white" font-family="system-ui" font-size="13" text-anchor="middle">Alert Darurat</text>
  <text x="560" y="550" fill="#14B8A6" font-family="monospace" font-size="11" text-anchor="middle">Real-time notif</text>
  <!-- Output 4 -->
  <rect x="680" y="505" width="200" height="60" rx="8" fill="#14B8A6" fill-opacity="0.1" stroke="#14B8A6" stroke-width="2"/>
  <text x="780" y="530" fill="white" font-family="system-ui" font-size="13" text-anchor="middle">Timeline Pasien</text>
  <text x="780" y="550" fill="#14B8A6" font-family="monospace" font-size="11" text-anchor="middle">Riwayat lengkap</text>

  <!-- BOTTOM BAR: INFRASTRUCTURE -->
  <rect x="0" y="575" width="900" height="25" fill="#1F2937"/>
  <text x="450" y="592" fill="#9CA3AF" font-family="monospace" font-size="11" text-anchor="middle">
    [Vultr VM] &nbsp; [Docker + Nginx] &nbsp; [SSL/HTTPS] &nbsp; [FastAPI] &nbsp; [Next.js 14]
  </text>
</svg>
